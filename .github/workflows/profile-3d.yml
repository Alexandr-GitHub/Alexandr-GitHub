name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check contribution token (read:user required for private repo languages)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_CONTRIB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "::error::Добавьте секрет GH_CONTRIB_TOKEN (classic PAT: repo + read:user)."
            exit 1
          fi
          result=$(curl -sS -H "Authorization: bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"query { user(login: \\\"$USERNAME\\\") { contributionsCollection { restrictedContributionsCount totalCommitContributions commitContributionsByRepository(maxRepositories: 20) { repository { name primaryLanguage { name } } contributions { totalCount } } } } }\"}" \
            https://api.github.com/graphql)
          echo "$result" | jq '{
            restricted: .data.user.contributionsCollection.restrictedContributionsCount,
            totalCommits: .data.user.contributionsCollection.totalCommitContributions,
            repos: [.data.user.contributionsCollection.commitContributionsByRepository[] | {name: .repository.name, lang: .repository.primaryLanguage.name, commits: .contributions.totalCount}]
          }'
          restricted=$(echo "$result" | jq -r '.data.user.contributionsCollection.restrictedContributionsCount // 0')
          langs=$(echo "$result" | jq '[.data.user.contributionsCollection.commitContributionsByRepository[] | select(.repository.primaryLanguage != null)] | length')
          if [ "$restricted" -gt 0 ] && [ "$langs" -eq 0 ]; then
            echo "::warning::У токена нет read:user или GitHub не отдаёт приватные коммиты. В SVG будет other. Создайте classic PAT с scope: repo, read:user."
          fi

      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GH_CONTRIB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          MAX_REPOS: 100

      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add -A .
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "generated"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
